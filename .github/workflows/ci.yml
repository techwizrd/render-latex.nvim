name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lua:
    name: Lua and Neovim tests (${{ matrix.neovim }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        neovim: [v0.10.0, v0.11.0, v0.12.0, nightly]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim }}
      - name: Install Lua test dependencies
        run: sudo apt-get update && sudo apt-get install -y lua5.1 luarocks
      - uses: JohnnyMorganz/stylua-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check lua/ plugin/ repro/ tests/
      - name: Run workflow lint
        run: make actionlint
      - name: Install Lua language server
        run: |
          curl -fL -o lua-language-server.tar.gz https://github.com/LuaLS/lua-language-server/releases/download/3.13.6/lua-language-server-3.13.6-linux-x64.tar.gz
          mkdir -p .tools/lua-language-server
          tar -xzf lua-language-server.tar.gz -C .tools/lua-language-server
          echo "$PWD/.tools/lua-language-server/bin" >> "$GITHUB_PATH"
      - name: Run Lua typecheck
        run: make typecheck
      - name: Run Neovim tests
        run: make test

  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - name: Run worker tests
        run: cargo test --package render-latex-worker
      - name: Run Clippy
        run: cargo clippy --package render-latex-worker --all-targets -- -D warnings

  worker-build:
    name: Worker build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-2025, windows-11-arm]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - name: Check Rust formatting
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all --check
      - name: Build worker
        run: cargo build --release --package render-latex-worker
